server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /custom {
        return 200 "custom-ok\n";
        add_header Content-Type "text/plain";
    }

    location /post-test {
        return 200 "post-received\n";
        add_header Content-Type "text/plain";
    }
}
